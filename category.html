<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071827">
  <meta name="description" content="台灣工程地圖圖層頁：依工程類型、縣市與辦理狀態查看工程點位、甲方、乙方、金額、期程與來源。">
  <title>工程圖層｜台灣工程地圖 Taiwan Construction Map</title>
  <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin>
  <link rel="dns-prefetch" href="//tile.openstreetmap.org">
  <link rel="preload" href="./Content/Taiwan_Construction.PNG" as="image" fetchpriority="high">
  <link rel="preload" href="./data/active_construction_projects.geojson?v=20260704-city-filter" as="fetch" type="application/geo+json" crossorigin>
  <link rel="stylesheet" href="./fast-map.css?v=20260711-single-source">
</head>
<body data-page="category">
  <a class="skip" href="#mapSec"><span class="zh-only">跳到工程圖層地圖</span><span class="en-only inline-en">Skip to the project layer map</span></a>
  <div data-site-header></div>

  <main>
    <section class="hero">
      <div>
        <p class="pill" id="sectorPill">工程圖層地圖</p>
        <h1 id="sectorTitle">工程圖層地圖</h1>
        <p id="sectorLead">用縣市查詢工程點位、甲方、乙方、金額、期程與來源。手機上也能快速看案場分布。</p>
        <div class="actions">
          <a class="btn" href="#mapSec" data-t="openSector">打開分類地圖</a>
          <a class="btn alt" href="./index.html" data-t="overview">全國工程概況</a>
        </div>
      </div>
      <div class="metrics" aria-label="工程圖層統計">
        <article><b id="m1">0</b><span data-t="projects">現況工程</span></article>
        <article><b id="m2">0</b><span data-t="counties">有資料縣市</span></article>
        <article><b id="m3">1</b><span data-t="sectorSingle">目前圖層</span></article>
      </div>
    </section>

    <section id="mapSec" class="layout">
      <aside class="side">
        <p class="eyebrow" id="sectorEyebrow">圖層查詢</p>
        <h2 id="sectorSideTitle">分縣市看工程點位</h2>
        <p id="sectorSideText">選擇縣市或搜尋工程名稱、甲方、乙方，地圖會同步聚焦。</p>
        <div class="fieldTools">
          <label class="search"><span data-t="search">搜尋</span><input id="q" type="search" inputmode="search" autocomplete="off" placeholder="例：臺北、甲方、工程名"></label>
          <div class="filters">
            <label><span data-t="cityFilter">縣市</span><select id="cityFilter"></select></label>
            <label><span data-t="status">辦理狀態</span><select id="status"></select></label>
          </div>
        </div>
        <button id="reset" class="reset" data-t="resetSector">回到圖層全覽</button>
        <div id="cityCards" class="citycards" aria-live="polite"></div>
      </aside>

      <section class="mapcard">
        <div class="mapbar">
          <div><p class="eyebrow" data-t="osm">OpenStreetMap 電子地圖</p><h2 id="sectorMapTitle">工程圖層地圖</h2></div>
          <p id="health" data-t="boot">工程清單已可用，地圖背景載入中。</p>
        </div>
        <div id="map" class="map" aria-label="工程圖層地圖"></div>
        <div id="detail" class="detail" aria-live="polite"></div>
      </section>
    </section>

    <section class="block lazySection">
      <div class="title"><p class="eyebrow" data-t="list">工程清單</p><h2 data-t="listTitle">點位、甲方、乙方、期程與來源。</h2></div>
      <div id="list" class="cards" aria-live="polite"></div>
    </section>
  </main>

  <div data-site-footer></div>
  <script src="./site-shell.js?v=20260711-single-source"></script>
  <script type="module" src="./fast-map.js?v=20260711-single-source"></script>
</body>
</html>
